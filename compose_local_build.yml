# VNoctis Manager — Docker Compose (local build variant)
#
# IMPORTANT: Copy .env.example to .env and set at least VNM_ROOT before running.
# All host paths and settings are defined in .env (single source of truth).
#
# To use pre-built images from yourrepo.com, replace
#   build: ./services/vnm-api
# with:
#   image: yourrepo.com/vnm/vnm-api:latest
#
# Likewise for vnm-builder and vnm-ui.

name: vn-manager

services:
  vnm-api:
    build:
      context: ./services/vnm-api
      dockerfile: Dockerfile
    container_name: vnm-api
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    expose:
      - "3001"
    volumes:
      - ${VNM_ROOT}/games:/games:rw
      - vnm-data:/data
      - vnm-logs:/data/logs
      - vnm-covers:/covers
      - vnm-screenshots:/screenshots
      - vnm-web-builds:/web-builds:ro
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      VNM_R2_MODE: ${VNM_R2_MODE:-false}
      GAMES_PATH: /games
      COVERS_PATH: /covers
      SCREENSHOTS_PATH: /screenshots
      WEB_BUILDS_PATH: /web-builds
      VNDB_API_BASE: ${VNDB_API_BASE}
      VNDB_RATE_DELAY_MS: ${VNDB_RATE_DELAY_MS}
      VNDB_MATCH_THRESHOLD: ${VNDB_MATCH_THRESHOLD}
      VNDB_API_TOKEN: ${VNDB_API_TOKEN}
      METADATA_TTL_DAYS: ${METADATA_TTL_DAYS}
      VNM_ADMIN_USER: ${VNM_ADMIN_USER:-admin}
      VNM_ADMIN_PASSWORD: ${VNM_ADMIN_PASSWORD}
      VNM_JWT_SECRET: ${VNM_JWT_SECRET:-}
      VNM_SESSION_TTL_DAYS: ${VNM_SESSION_TTL_DAYS:-30}
      LOG_PATH: /data/logs
      LOG_LEVEL: ${LOG_LEVEL}
      TZ: ${TZ}
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/api/v1/health').then(r => { if (!r.ok) process.exit(1) }).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - vnm-network

  vnm-builder:
    build:
      context: ./services/vnm-builder
      dockerfile: Dockerfile
    container_name: vnm-builder
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    expose:
      - "3002"
    volumes:
      - ${VNM_ROOT}/games:/games:rw
      - vnm-web-builds:/web-builds
      - ${VNM_ROOT}/renpy-sdk:/renpy-sdk:rw
      - vnm-logs:/data/logs
    environment:
      # Builder runs as root to execute Ren'Py SDK scripts which may have restricted permissions
      PUID: "0"
      PGID: "0"
      RENPY_SDK_PATH: /renpy-sdk
      RENPY_SDK_VERSION: ${RENPY_SDK_VERSION:-8.5.2}
      GAMES_PATH: /games
      WEB_BUILDS_PATH: /web-builds
      API_URL: http://vnm-api:3001
      COMPRESS_JPEG_QUALITY: ${COMPRESS_JPEG_QUALITY:-80}
      COMPRESS_PNG_QUALITY: ${COMPRESS_PNG_QUALITY:-60-80}
      COMPRESS_WEBP_QUALITY: ${COMPRESS_WEBP_QUALITY:-80}
      COMPRESS_WORKERS: ${COMPRESS_WORKERS:-0}
      LOG_PATH: /data/logs
      LOG_LEVEL: ${LOG_LEVEL}
      TZ: ${TZ}
    depends_on:
      - vnm-api
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3002/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    mem_limit: 16g
    cpus: 8
    networks:
      - vnm-network

  vnm-ui:
    build:
      context: ./services/vnm-ui
      dockerfile: Dockerfile
    container_name: vnm-ui
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
    ports:
      - "${HOST_PORT}:80"
    volumes:
      - vnm-web-builds:/web-builds:rw
      - vnm-covers:/covers:ro
      - vnm-screenshots:/screenshots:ro
    depends_on:
      - vnm-api
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - vnm-network

volumes:
  vnm-data:
  vnm-logs:
  vnm-web-builds:
  vnm-covers:
  vnm-screenshots:

networks:
  vnm-network:
    driver: bridge
