server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Large file uploads (game imports) ────────────
    client_max_body_size 24576m;

    # ── Gzip compression ──────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ── API proxy ─────────────────────────────────────
    location /api/ {
        proxy_pass http://vnm-api:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE support: disable buffering and extend read timeout
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400;
        proxy_set_header Connection '';

        # Large upload support (game imports up to 24 GB)
        # At 10 MB/s a 24 GB upload takes ~40 min; allow up to 2 hours.
        proxy_connect_timeout 300;
        proxy_send_timeout 7200;
    }

    # ── Cover images from volume ──────────────────────
    location /covers/ {
        alias /covers/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ── Screenshot images from volume ─────────────────
    location /screenshots/ {
        alias /screenshots/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ── Web builds from volume ────────────────────────
    location /web-builds/ {
        alias /web-builds/;
        expires 1d;
        add_header Cache-Control "public";
        add_header Cross-Origin-Opener-Policy "same-origin";
        add_header Cross-Origin-Embedder-Policy "require-corp";
    }

    # ── Static assets with caching ────────────────────
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ── SPA fallback ──────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
