# VNoctis Manager — Docker Compose
#
# IMPORTANT: Copy .env.example to .env and set at least VNM_ROOT before running.
# All host paths and settings are defined in .env (single source of truth).
#
# To use local builds instead of registry images, replace
#   image: yourrepo.com/vnm/vnm-*:latest
# with:
#   build: ./services/vnm-*

services:
  vnm-api:
    image: yourrepo.com/vnm/vnm-api:latest
    # build: ./services/vnm-api
    container_name: vnm-api
    restart: unless-stopped
    expose:
      - "3001"
    volumes:
      - ${VNM_ROOT}/games:/games:rw
      - ${VNM_ROOT}/data:/data
      - ${VNM_ROOT}/covers:/covers
      - ${VNM_ROOT}/screenshots:/screenshots
      - ${VNM_ROOT}/web-builds:/web-builds:rw
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      DATABASE_URL: file:/data/vnm.db
      GAMES_PATH: /games
      COVERS_PATH: /covers
      SCREENSHOTS_PATH: /screenshots
      WEB_BUILDS_PATH: /web-builds
      VNDB_API_BASE: ${VNDB_API_BASE}
      VNDB_RATE_DELAY_MS: ${VNDB_RATE_DELAY_MS}
      VNDB_MATCH_THRESHOLD: ${VNDB_MATCH_THRESHOLD}
      VNDB_API_TOKEN: ${VNDB_API_TOKEN}
      METADATA_TTL_DAYS: ${METADATA_TTL_DAYS}
      BUILDER_URL: http://vnm-builder:3002
      VNM_ADMIN_USER: ${VNM_ADMIN_USER:-admin}
      VNM_ADMIN_PASSWORD: ${VNM_ADMIN_PASSWORD}
      VNM_JWT_SECRET: ${VNM_JWT_SECRET:-}
      VNM_SESSION_TTL_DAYS: ${VNM_SESSION_TTL_DAYS:-30}
      LOG_LEVEL: ${LOG_LEVEL}
      TZ: ${TZ}
    networks:
      - vnm-network
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/api/v1/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  vnm-builder:
    image: yourrepo.com/vnm/vnm-builder:latest
    # build: ./services/vnm-builder
    container_name: vnm-builder
    restart: unless-stopped
    expose:
      - "3002"
    volumes:
      - ${VNM_ROOT}/games:/games:rw
      - ${VNM_ROOT}/renpy-sdk:/renpy-sdk:rw
      - ${VNM_ROOT}/web-builds:/web-builds
    environment:
      # Builder runs as root to execute Ren'Py SDK scripts which may have restricted permissions
      PUID: "0"
      PGID: "0"
      RENPY_SDK_PATH: /renpy-sdk
      RENPY_SDK_VERSION: ${RENPY_SDK_VERSION:-8.5.2}
      GAMES_PATH: /games
      WEB_BUILDS_PATH: /web-builds
      API_URL: http://vnm-api:3001
      BUILD_CONCURRENCY: ${BUILD_CONCURRENCY}
      COMPRESS_JPEG_QUALITY: ${COMPRESS_JPEG_QUALITY:-80}
      COMPRESS_PNG_QUALITY: ${COMPRESS_PNG_QUALITY:-60-80}
      COMPRESS_WEBP_QUALITY: ${COMPRESS_WEBP_QUALITY:-80}
      COMPRESS_WORKERS: ${COMPRESS_WORKERS:-0}
      LOG_LEVEL: ${LOG_LEVEL}
      TZ: ${TZ}
    networks:
      - vnm-network
    mem_limit: 16g
    cpus: 8
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3002/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  vnm-ui:
    image: yourrepo.com/vnm/vnm-ui:latest
    # build: ./services/vnm-ui
    container_name: vnm-ui
    restart: unless-stopped
    ports:
      - "${HOST_PORT}:80"
    volumes:
      - ${VNM_ROOT}/web-builds:/web-builds:ro
      - ${VNM_ROOT}/covers:/covers:ro
      - ${VNM_ROOT}/screenshots:/screenshots:ro
    depends_on:
      - vnm-api
    networks:
      - vnm-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  vnm-network:
    driver: bridge
